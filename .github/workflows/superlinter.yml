name: Super-Linter

on: 
  push:
    branches:
      - main

jobs:
  super-lint:
    name: Lint and Format Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 'latest'  # Use the latest stable Python version

      - name: Install dependencies
        run: |
          pip install black markdownlint

      - name: Format Python code
        run: |
          black .  # Formats all Python files in the repository

      - name: Format Markdown files
        run: |
          markdownlint --fix "**/*.md"  # Adjust file patterns as needed

      - name: Check for code formatting
        run: |
          git diff --exit-code  # Fail the action if there are uncommitted changes

      - name: Run Super-Linter
        uses: github/super-linter@v4
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
